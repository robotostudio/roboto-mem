name: Release

# Triggered by pushing a version tag, e.g. `git push origin v0.1.2`.
# Prerequisite (one time): configure npm trusted publishing for this package
# at npmjs.com → package → Settings → Trusted publishers, with:
#   repository: robotostudio/roboto-mem · workflow: release.yml · environment: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

# Never cancel an in-flight release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    # Least privilege: verification only needs to read the repo and build.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # pnpm must be set up before setup-node so its cache can resolve the store.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Tag matches every version source
        run: pnpm check:version "${GITHUB_REF_NAME}"

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Upload the built CLI for the publish job.
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: verify
    runs-on: ubuntu-latest
    # Scopes the publish to an environment you can protect in repo settings,
    # and which the npm trusted publisher is pinned to.
    environment: release
    permissions:
      contents: write # create the GitHub release
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Download the built CLI from the verify job.
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      # Re-assert tag ↔ version in the privileged job (self-validating; the
      # script is dependency-free so it needs no install).
      - name: Tag matches every version source
        run: node scripts/check-version-sync.mjs "${GITHUB_REF_NAME}"

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships 10.x.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install --global npm@11.5.1

      # Publish idempotently: skip if this version is already on the registry.
      - name: Publish to npm (skip if already published)
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "roboto-mem@${VERSION}" version >/dev/null 2>&1; then
            echo "roboto-mem@${VERSION} already on the registry — skipping publish"
          else
            npm publish --provenance --access public --ignore-scripts
          fi

      # Create GitHub release idempotently (don't fail if it already exists).
      - name: Create GitHub release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes
